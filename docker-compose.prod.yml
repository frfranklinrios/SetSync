# Produção (Contabo): só persiste ./data — sem montar o código fonte no container.
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - nginx_proxy_net

networks:
  nginx_proxy_net:
    external: true
    name: root_backend
