# Produção (Contabo): Postgres + app; persiste ./data (logos, backup SQLite) e volume PG.
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: setsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: setsync
    volumes:
      - setsync_pg_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setsync -d setsync"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - default

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: setsync-evolution
    env_file:
      - .env
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      SERVER_URL: http://127.0.0.1:8088
      CONFIG_SESSION_PHONE_CLIENT: SetSync
      CONFIG_SESSION_PHONE_NAME: SetSync
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://setsync:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      CACHE_REDIS_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      QRCODE_LIMIT: "30"
    volumes:
      - ./data/evolution:/evolution/instances
    ports:
      - "127.0.0.1:8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  mail:
    build:
      context: .
      dockerfile: Dockerfile.mail
    container_name: setsync-mail
    env_file:
      - .env
    environment:
      MAIL_DATA_DIR: /app/data/mail
      MAIL_DATABASE_PATH: /app/data/mail/emails.db
      SMTP_CONNECT_HOST: mail
    volumes:
      - ./data/mail:/app/data/mail
    ports:
      - "25:25"
      - "587:587"
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - default

  web:
    build: .
    env_file:
      - .env
    environment:
      TZ: ${SETSYNC_TIMEZONE:-America/Fortaleza}
      SETSYNC_TIMEZONE: ${SETSYNC_TIMEZONE:-America/Fortaleza}
      MAIL_DATA_DIR: /app/data/mail
      MAIL_DATABASE_PATH: /app/data/mail/emails.db
      SMTP_CONNECT_HOST: mail
      EVOLUTION_API_URL: http://evolution-api:8080
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mail:
        condition: service_started
      evolution-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - default
      - nginx_proxy_net

volumes:
  setsync_pg_prod:

networks:
  nginx_proxy_net:
    external: true
    name: root_backend
