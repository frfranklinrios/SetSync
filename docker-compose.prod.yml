# Produção (Contabo): Postgres + app; persiste ./data (logos, backup SQLite) e volume PG.
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: setsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: setsync
    volumes:
      - setsync_pg_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setsync -d setsync"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - default

  web:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - default
      - nginx_proxy_net
      - mail_net

volumes:
  setsync_pg_prod:

networks:
  nginx_proxy_net:
    external: true
    name: root_backend
  mail_net:
    external: true
    name: servidor_email_default
