{% extends "index.html" %}

{% block title %}Conta criada · SetSync{% endblock %}

{% block content %}
<div class="text-center py-5 px-3" style="max-width: 28rem; margin: 0 auto;">
    <div class="mb-3" style="font-size: 2.5rem; color: var(--accent);">
        <i class="fas fa-circle-check" aria-hidden="true"></i>
    </div>
    <h1 class="h4 mb-2">Conta criada com sucesso!</h1>
    <p class="text-muted mb-0">Redirecionando para o app…</p>
</div>
{% endblock %}

{% block scripts %}
{% include 'partials/google_ads_enhanced.html' %}
<script>
(function () {
    var dest = {{ next_url|tojson }};
    setTimeout(function () { window.location.replace(dest); }, 1200);
})();
</script>
{% endblock %}
