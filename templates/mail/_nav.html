<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <div>
        <h1 class="mb-1" style="font-size:1.35rem; font-weight:700;">
            <i class="fas fa-envelope me-2" style="color:var(--chord-highlight,var(--accent));"></i>
            E-mail
        </h1>
        <p class="text-muted mb-0" style="font-size:0.88rem;">{{ mailbox }}</p>
    </div>
    <div class="d-flex flex-wrap gap-2">
        <a href="{{ url_for('mail_web.compose') }}" class="btn btn-primary btn-sm">
            <i class="fas fa-pen me-1"></i> Escrever
        </a>
        <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary btn-sm">Admin</a>
    </div>
</div>
<ul class="nav nav-pills mb-3 gap-1">
    <li class="nav-item">
        <a class="nav-link {% if folder == 'inbox' %}active{% endif %}" href="{{ url_for('mail_web.inbox') }}">
            <i class="fas fa-inbox me-1"></i> Caixa de entrada
            {% if unread_count %}<span class="badge bg-danger ms-1">{{ unread_count }}</span>{% endif %}
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if folder == 'sent' %}active{% endif %}" href="{{ url_for('mail_web.sent') }}">
            <i class="fas fa-paper-plane me-1"></i> Enviados
        </a>
    </li>
</ul>
