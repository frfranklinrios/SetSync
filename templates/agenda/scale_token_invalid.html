{% extends "index.html" %}
{% block title %}Link inválido · SetSync{% endblock %}
{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-lg-6 text-center">
    <h2 class="h5 mb-2">Link inválido ou expirado</h2>

  </div>
</div>
{% endblock %}
