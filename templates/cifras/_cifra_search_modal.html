{# Modal: busca, preview e importação de cifras para a banda #}
<link rel="stylesheet" href="{{ url_for('static', filename='css/cifra-search-modal.css') }}?v=1">

<div class="modal fade" id="cifraSearchModal" tabindex="-1" aria-labelledby="cifraSearchModalLabel" aria-hidden="true"
     data-band-id="{{ band.id }}">
  <div class="modal-dialog modal-dialog-scrollable modal-xl modal-fullscreen-sm-down">
    <div class="modal-content cifra-search-modal-content" id="cifraSearchModalContent">
      <div class="modal-header border-0 pb-0">
        <div class="w-100">
          <h5 class="modal-title" id="cifraSearchModalLabel">
            <i class="fas fa-search me-2 text-muted"></i>Buscar cifra
          </h5>
          <p class="text-muted small mb-0 cifra-search-modal-subtitle">
            Biblioteca local + índice online · preview antes de importar
          </p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <div class="modal-body pt-2">
        <div id="cifra-search-step-search">
          <label class="form-label small" for="cifra-modal-query">Título ou artista</label>
          <div class="input-group mb-2">
            <input type="search" class="form-control" id="cifra-modal-query"
                   placeholder="Ex.: Fernandinho ele está comigo" autocomplete="off">
            <button type="button" class="btn btn-primary" id="cifra-modal-search-btn">Buscar</button>
          </div>
          <p class="form-text" id="cifra-modal-status" role="status"></p>
          <div class="cifra-modal-results d-none" id="cifra-modal-results"></div>
        </div>

        <div id="cifra-search-step-preview" class="d-none">
          <div class="cifra-modal-preview-toolbar">
            <button type="button" class="btn btn-sm btn-outline-secondary" id="cifra-modal-back">
              <i class="fas fa-arrow-left me-1"></i> Voltar
            </button>
            <div class="cifra-modal-preview-heading">
              <div class="title" id="cifra-modal-preview-title"></div>
              <div class="meta" id="cifra-modal-preview-meta"></div>
            </div>
          </div>
          <div class="cifra-container cifra-sheet-paper cifra-modal-preview-box" id="cifra-modal-preview-body"
               role="document" aria-label="Preview da cifra"></div>
        </div>
      </div>

      <div class="modal-footer border-0 pt-0 flex-wrap gap-2 justify-content-end">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary d-none" id="cifra-modal-import-btn">
          <i class="fas fa-download me-1"></i> Importar para {{ band.name }}
        </button>
      </div>
    </div>
  </div>
</div>
