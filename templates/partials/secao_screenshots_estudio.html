<section class="secao-screenshots secao-screenshots--estudio" aria-labelledby="secao-screenshots-estudio-titulo">
    <h2 id="secao-screenshots-estudio-titulo">O painel do dono de estúdio</h2>
    <p class="section-sub mx-auto">
        Salas, QR na recepção e reservas no celular — mais o <strong>financeiro</strong> no desktop:
        receita, pendências, preço/hora e despesas do mês.
    </p>
    <div class="mockup-grid">
        <figure class="mockup-mobile">
            <button type="button" class="mockup-zoom-trigger"
                    data-lightbox-src="{{ url_for('static', filename='screenshots/estudio-painel-mobile.png') }}"
                    data-lightbox-alt="Painel do estúdio no celular — salas, QR de agendamento e métricas do Groove Box Ensaios"
                    data-lightbox-caption="Painel no celular — salas e QR"
                    aria-label="Ampliar captura do painel no celular">
                <div class="mockup-mobile-frame">
                    <img src="{{ url_for('static', filename='screenshots/estudio-painel-mobile.png') }}"
                         alt=""
                         width="478" height="785"
                         loading="lazy"
                         decoding="async">
                </div>
            </button>
            <figcaption class="mockup-caption">Painel no celular — salas e QR<span class="mockup-caption-hint">Clique para ampliar</span></figcaption>
        </figure>
        <figure class="mockup-desktop">
            <button type="button" class="mockup-zoom-trigger"
                    data-lightbox-src="{{ url_for('static', filename='screenshots/estudio-financeiro-desktop.png') }}"
                    data-lightbox-alt="Financeiro do estúdio no SetSync — receita, reservas confirmadas, preço por hora e despesas"
                    data-lightbox-caption="Financeiro — receita, reservas e despesas"
                    aria-label="Ampliar captura do financeiro">
                <div class="mockup-desktop-frame">
                    <img src="{{ url_for('static', filename='screenshots/estudio-financeiro-desktop.png') }}"
                         alt=""
                         width="2640" height="1422"
                         loading="lazy"
                         decoding="async">
                </div>
            </button>
            <figcaption class="mockup-caption">Financeiro — receita, reservas e despesas<span class="mockup-caption-hint">Clique para ampliar</span></figcaption>
        </figure>
    </div>
</section>
{% include 'partials/image_lightbox_assets.html' %}
<style>
.secao-screenshots {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    text-align: center;
}

    max-width: 36rem;
    margin-left: auto;
    margin-right: auto;
}
.mockup-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.65fr);
    gap: 2rem;
    align-items: end;
    margin-top: 2rem;
    text-align: center;
}
.mockup-mobile,
.mockup-desktop {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.mockup-mobile-frame {
    width: min(100%, 272px);
    padding: 10px;
    border: 1px solid #334155;
    border-radius: 28px;
    background: linear-gradient(180deg, #1e293b 0%, #0b1422 100%);
    box-shadow:
        0 24px 48px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);

.mockup-mobile-frame img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 18px;
    border: 1px solid #1e293b;

.mockup-desktop-frame {
    width: 100%;
    border: 1px solid #334155;
    border-radius: 12px;

    background: #0b1422;

}

    width: 100%;
    height: auto;
    display: block;
    vertical-align: middle;
}
.mockup-caption {
    margin-top: 0.85rem;
    font-size: var(--text-sm);
    color: var(--muted);
    font-weight: 500;
}
@media (max-width: 768px) {
    .mockup-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;

}
