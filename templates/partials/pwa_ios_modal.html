<div class="modal fade" id="pwa-ios-modal" tabindex="-1" aria-labelledby="pwa-ios-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:var(--bg);color:var(--text);border:1px solid var(--border);">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="pwa-ios-modal-label">
                    <i class="fas fa-mobile-screen-button me-2" style="color:var(--accent);"></i>
                    Instalar no iPhone/iPad
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">No iOS o app é instalado pelo <strong>Safari</strong> (não pelo Chrome).</p>
                <ol class="mb-0 ps-3" style="line-height:1.65;">
                    <li class="mb-2">Abra o SetSync no <strong>Safari</strong>.</li>
                    <li class="mb-2">Toque em <strong>Compartilhar</strong> <i class="fas fa-arrow-up-from-bracket"></i> (barra inferior).</li>
                    <li class="mb-2">Role e toque em <strong>Adicionar à Tela de Início</strong> <i class="fas fa-plus-square"></i>.</li>
                    <li>Confirme em <strong>Adicionar</strong>. O ícone do SetSync aparecerá na tela inicial.</li>
                </ol>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>
