<style>
.mockup-zoom-trigger,
.home-estudio-shot[data-lightbox-src] {
    border: none;
    background: none;
    padding: 0;
    margin: 0;
    cursor: zoom-in;
    font: inherit;
    color: inherit;
    text-align: inherit;
    text-decoration: none;
    display: block;
    width: auto;
    max-width: 100%;
}
.mockup-desktop .mockup-zoom-trigger {
    width: 100%;
}
.mockup-zoom-trigger:focus-visible,
.home-estudio-shot[data-lightbox-src]:focus-visible {
    outline: 2px solid var(--accent, #14b8a6);
    outline-offset: 4px;
    border-radius: 12px;
}
.ss-image-lightbox {
    border: none;
    padding: 0;
    margin: 0;
    width: 100vw;
    max-width: 100vw;
    height: 100vh;
    max-height: 100vh;
    background: #020617;
    overflow: hidden;
}
.ss-image-lightbox::backdrop {
    background: rgba(2, 6, 23, 0.94);
}
.ss-image-lightbox__chrome {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: calc(0.55rem + env(safe-area-inset-top, 0px)) 0.75rem 0.45rem;
    background: linear-gradient(180deg, rgba(2, 6, 23, 0.98) 0%, rgba(2, 6, 23, 0.72) 100%);
}
.ss-image-lightbox__close {
    position: absolute;
    top: calc(0.45rem + env(safe-area-inset-top, 0px));
    right: max(0.65rem, env(safe-area-inset-right, 0px));
    z-index: 4;
    width: 2.75rem;
    height: 2.75rem;
    border: none;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.95);
    color: #f8fafc;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
}
.ss-image-lightbox__close:hover {
    background: rgba(30, 41, 59, 0.98);
}
.ss-image-lightbox__zoom {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.25rem 0.35rem;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.28);
}
.ss-image-lightbox__zoom-btn {
    min-width: 2.25rem;
    height: 2.25rem;
    border: none;
    border-radius: 999px;
    background: rgba(51, 65, 85, 0.65);
    color: #f8fafc;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
}
.ss-image-lightbox__zoom-btn:hover {
    background: rgba(71, 85, 105, 0.95);
}
.ss-image-lightbox__zoom-btn--fit {
    min-width: auto;
    padding: 0 0.75rem;
    font-size: var(--text-xs);
    font-weight: 600;
}
.ss-image-lightbox__zoom-label {
    min-width: 3.1rem;
    text-align: center;
    color: #e2e8f0;
    font-size: var(--text-sm);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}
.ss-image-lightbox__stage {
    position: relative;
    width: 100%;
    height: calc(100vh - 7.5rem - env(safe-area-inset-bottom, 0px));
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    background:
        radial-gradient(circle at 50% 0%, rgba(30, 41, 59, 0.35), transparent 55%),
        #020617;
}
.ss-image-lightbox__stage.is-dragging {
    cursor: grabbing;
}
.ss-image-lightbox__figure {
    margin: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ss-image-lightbox__img {
    display: block;
    max-width: none;
    max-height: none;
    width: auto;
    height: auto;
    transform-origin: 0 0;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    background: #0b1422;
    user-select: none;
    -webkit-user-drag: none;
}
.ss-image-lightbox__caption {
    margin: 0;
    padding: 0.55rem 1rem 0.15rem;
    text-align: center;
    color: #e2e8f0;
    font-size: var(--text-sm);
    font-weight: 600;
}
.ss-image-lightbox__hint {
    margin: 0;
    padding: 0 1rem calc(0.65rem + env(safe-area-inset-bottom, 0px));
    text-align: center;
    color: #94a3b8;
    font-size: var(--text-xs);
}
.mockup-caption-hint {
    display: block;
    margin-top: 0.2rem;
    font-size: var(--text-xs);
    opacity: 0.75;
    font-weight: 400;
}
@media (max-width: 520px) {
    .ss-image-lightbox__zoom-btn--fit {
        display: none;
    }
}
</style>
<script src="{{ url_for('static', filename='js/image-lightbox.js') }}?v=2" defer></script>
