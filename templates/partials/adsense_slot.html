{# Bloco responsivo no rodapé — com ou sem data-ad-slot (unidade criada no painel AdSense) #}
{% set slot_id = slot|default('', true)|trim %}
<aside class="ss-adsense" role="complementary" aria-label="Anúncio">
    <ins class="adsbygoogle"
         style="display:block;min-height:90px;min-width:250px"
         data-ad-client="{{ adsense.client }}"
         {% if slot_id %}data-ad-slot="{{ slot_id }}"{% endif %}
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</aside>
