{# Botão flutuante WhatsApp — exibido quando WHATSAPP_NUMBER / SETSYNC_WHATSAPP está configurado #}
{% if whatsapp_number %}
<a href="https://wa.me/{{ whatsapp_number }}?text={{ whatsapp_message|urlencode }}"
   class="wa-floating-btn"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Falar com SetSync no WhatsApp"
   title="WhatsApp">
    <i class="fab fa-whatsapp" aria-hidden="true"></i>
</a>
<style>
.wa-floating-btn {
    position: fixed;
    z-index: 1030;
    right: max(1.15rem, env(safe-area-inset-right, 0px));
    bottom: max(1.15rem, env(safe-area-inset-bottom, 0px));
    width: 3.35rem;
    height: 3.35rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #25d366;
    color: #fff;
    font-size: 1.65rem;
    text-decoration: none;
    box-shadow:
        0 4px 14px rgba(37, 211, 102, 0.45),
        0 2px 6px rgba(0, 0, 0, 0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.wa-floating-btn:hover {
    color: #fff;
    background: #1ebe57;
    transform: scale(1.06);
    box-shadow:
        0 6px 20px rgba(37, 211, 102, 0.5),
        0 3px 10px rgba(0, 0, 0, 0.22);
}
.wa-floating-btn:focus-visible {
    outline: 3px solid var(--chord-highlight-ring, rgba(45, 212, 191, 0.45));
    outline-offset: 3px;
}
body.play-mode .wa-floating-btn {
    display: none !important;
}
@media print {
    .wa-floating-btn { display: none !important; }
}
@media (max-width: 480px) {
    .wa-floating-btn {
        width: 3.1rem;
        height: 3.1rem;
        font-size: 1.5rem;
    }
}
</style>
{% endif %}
