{% if google_ads_ativo and may_load_tracking %}
{% if google_ads.use_gtm %}
<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','{{ google_ads.gtm_id }}');</script>
<!-- End Google Tag Manager -->
{% elif google_ads.aw_id %}
{% if google_analytics_ativo %}
<script>
gtag('config', '{{ google_ads.aw_id }}');
</script>
{% else %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ google_ads.aw_id }}"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '{{ google_ads.aw_id }}');
</script>
{% endif %}
{% endif %}
{% endif %}
