{% extends "index.html" %}

{% block title %}Login - SetSync{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-sm-10 col-md-6 col-lg-4">

        <div class="text-center mb-5">
            <img src="{{ url_for('static', filename='logoSetSync.png') }}" alt="SetSync" style="height:64px;">
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <p class="text-muted mb-4" style="font-size:0.8rem;">Você permanece conectado neste dispositivo até sair em Sair.</p>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="d-flex align-items-center my-4">
            <hr class="flex-grow-1"><span class="px-3 text-muted" style="font-size:0.75rem;">OU</span><hr class="flex-grow-1">
        </div>

        <a href="{{ url_for('auth.google') }}" class="btn btn-outline-secondary w-100">Entrar com Google</a>

        <p class="text-center text-muted mt-4" style="font-size:0.875rem;">
            Novo por aqui? <a href="{{ url_for('auth.register') }}" style="color:var(--accent);text-decoration:none;font-weight:600;">Crie sua conta</a>
        </p>
    </div>
</div>
<div class="mt-3">
    <a href="{{ url_for('auth.recuperar_senha') }}">Esqueceu sua senha?</a>
</div>
{% endblock %}
