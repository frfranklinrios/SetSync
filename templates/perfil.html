{% extends "index.html" %}

{% block title %}Meu perfil · SetSync{% endblock %}

{% block content %}
<div class="row justify-content-center py-2">
  <div class="col-lg-7">
    <h2 class="mb-3">Meu perfil</h2>
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('auth.perfil') }}">
          {% include 'partials/csrf_input.html' %}
          <div class="mb-3">
            <label class="form-label" for="display_name">Nome no app</label>
            <input type="text" class="form-control" id="display_name" name="display_name"
                   value="{{ user.display_name or '' }}" required maxlength="60">
            <div class="form-text">Aparece no menu e nas notificações da banda.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="phone">WhatsApp</label>
            <input type="tel" class="form-control" id="phone" name="phone"
                   value="{{ user.phone or '' }}" placeholder="Ex.: 11 99999-9999" inputmode="tel">
            <div class="form-text">Com DDI 55 se omitir o país. Usado para alertas da banda.</div>
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="whatsapp_notify" name="whatsapp_notify"
                   value="1" {% if user.whatsapp_notify is none or user.whatsapp_notify %}checked{% endif %}
                   {% if not user.phone %}disabled{% endif %}>
            <label class="form-check-label" for="whatsapp_notify">
              Receber notificações da banda por WhatsApp
            </label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Voltar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  var phone = document.getElementById('phone');
  var notify = document.getElementById('whatsapp_notify');
  if (!phone || !notify) return;
  function sync() {
    notify.disabled = !phone.value.trim();
    if (!phone.value.trim()) notify.checked = false;
  }
  phone.addEventListener('input', sync);
  sync();
})();
</script>
{% endblock %}
