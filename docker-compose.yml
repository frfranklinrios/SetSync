services:
  web:
    build: .
    network_mode: host
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
