# Desenvolvimento local — monta o código (.:/app). Em produção use docker-compose.prod.yml
services:
  web:
    build: .
    env_file:
      - .env
    environment:
      TZ: ${SETSYNC_TIMEZONE:-America/Fortaleza}
      SETSYNC_TIMEZONE: ${SETSYNC_TIMEZONE:-America/Fortaleza}
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default
      - nginx_proxy_net

networks:
  nginx_proxy_net:
    external: true
    name: root_backend
